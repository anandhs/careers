name: Generate career post

on:
  issues:
    types:
      - opened
      - labeled

permissions:
  contents: write
  issues: write

jobs:
  generate:
    if: contains(join(github.event.issue.labels.*.name, ','), 'career-request') || startsWith(github.event.issue.title, '[Career Request]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.155.3'
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate post from issue
        id: generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o-mini
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/generate-career-post.js

      - name: Validate Hugo build
        run: hugo --minify --cleanDestinationDir

      - name: Commit and push generated post
        id: publish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.generate.outputs.post_path }}"
          git commit -m "Publish career post: ${{ steps.generate.outputs.post_title }}"
          git push
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Comment on issue with publish details
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `I generated and published \`${{ steps.generate.outputs.post_path }}\` in commit \`${{ steps.publish.outputs.commit_sha }}\`.`
            });
